services:
  backend:
    build: .
    ports:
      - "8000:8000"
    environment:
      ENVIRONMENT: development
      API_HOST: 0.0.0.0
      API_PORT: 8000
      DATABASE_URL: sqlite:///./data/chorus.db
      AUTH_MODE: mock
      VAULT_MODE: mock
      PROVIDER_MODE: mock
      SEED_DEMO: "true"
      SEED_ON_STARTUP: "true"
    volumes:
      - ./src:/app/src
      - ./migrations:/app/migrations
      - ./data:/app/data
    command: uvicorn src.control_plane_app:create_app --host 0.0.0.0 --port 8000 --reload --factory
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
